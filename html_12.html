<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코드 표현</title>
</head>
<body>
    <h3> 새로운 줄 넘어가기</h3>
    <hr size = "5" width = "50%" height = "30" color = "red">
    <hr size = "15" width = "250" height = "10" color = "green">
    <hr width="75%" height = "35" color = "blue">
    <hr size = "70" color = "gray">
    <hr><br>
    <hr><br><br>
    <hr>
    <hr><br><br>
    <hr>
    &lt;br&gt; 태그로 다음 &#38;
               빈칸            &nbsp;    빈칸   &#160; 줄로 넘어갑니다 <br>
    2 개의 &lt; br &gt; 태그로 두 번 넘어 갑니다.<br><br>
    잘보이나요?

    <p>
        &#60;br&#62; &infin;                &#8734; </p>
        &apso;br&#39; &infin;               &#8734; </p>
        &radic;br&#8730; &infin;            &#8734; </p>

    
</body>
</html>

<!-- 
    문자나 기호의 엔터티와 코드 표현

    문자                    엔터티 표현                     코드 표현
    "                       &quot;                      &#34;
    '                       &apos;                      &#39;
    <                       &lt;                        &#60;
    >                       &gt;                        &#62;
    &                       &amp;                       &#38;
    빈칸                    &nbsp;                      &#160;
    무한대                  &infin;                     &#8734;
    시그마                  &sum;                       &#8721;
    나누기                  &divide;                    &#247;
    라딕                    &radic                      &#8730;



    블록 태그와 인라인 태그

    HTML은 Block 태그와 Inline 태그로 나뉩니다.

    Block Tag : <p>, <h1>, <div>, <ul>
    Inline Tag : <strong>, <a>, <img>, <span>
    
    . 블록 태그는 항상 새 라인에서 시작하고 브라우저의 왼쪽 끝에서 오른쪽 끝까지 블록 공간을 차지 합니다.
    . 인라인 태그는 블록에 삽입 되어 블록 콘텐츠의 일부를 표현하는데 사용됩니다.
 -->
