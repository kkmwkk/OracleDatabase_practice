<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title> 단락 나누기 </title>
</head>
<body>
    <h3>2 개의 단락 나누기</h3>

    <p>
        HTML 문서도
        문장을 여러


        단락           으로
        나눌 수 있다. css 스타일을 사용하면
        단락 단위로 내어 쓰기어 들여 쓰기가 가능하다.
        <p>
            여러 개의 빈 칸은 하나로 취급되며,
            엔터 키 역시 하나의 빈칸으로 처리된다.
        </p>
    </p>

   
    
</body>
</html>
