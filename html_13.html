    <title>수평선 긋기</title>
</head>
<body>
    <!-- color 태그에 '', "", # 으로 적어도 모두 " " 으로 맞춰진다.-->
    <h3>수평선 긋기</h3>
    
    <hr color = '#cccc66'>
    <p> hr 태그는 horizontal에서 딴 글자입니다.</p>

    <hr color = #55dd55>
    <p> hr 태그는 hroizontal에서 딴 글자입니다.</p>

    <hr color = "green">
    <p>종료 태그  &lt;/hr/&gt;를 사용하지 않습니다.</p>
</body>
