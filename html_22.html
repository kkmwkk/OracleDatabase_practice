<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Coffee Menu</title>
</head>
<body>
    <h1>메뉴</h1>
    <ul>
        <li type="square">아메리카노 <br />
            <img src = "../images/americano.jpg" width="100" height="100">
            에소프레소에 물을 넣어 연하게 마시는 커피   
        </li>
        <li type = "circle">카페라떼 <br />
            <img src = "../images/cafelatte.jpg" width="100" height="100">
            에소프레소와 우유를 넣은 커피   
        </li>
        <li>카푸치노 <br />
            <img src = "../images/cappuccino.jpg" width="100" height="100">
            우유를 섞은 커피에 계핏가루를 뿌린 이탈리아식 커피   
        </li>
        <li>콜라 <br />
            <img src = "../images/coke.webp" width="100" height="100">
            탄산이 일품인 탄산음료의 대표 코카콜라   
        </li>
    </ul>
</body>
</html>

<!-- 
    OL / UL

    <OL> 태그는 Ordered List <UL> 은 Unordered List 라는 뜻으로
        목록 등을 지정할 글머리표 스타일로 정리해 줍니다.
        사용법은 동일하며 차이점은 지정한 스타일에 따라 앞에 나타나는 글머리 표가 자동으로 정해져서 나타납니다.

        <UL TYPE="스타일">
            <LI TYPE="스타일">
            <LI TYPE="스타일">
            <LI TYPE="스타일">
        </UL>

    . 스타일

    . disc : 속이 꽉찬 검은 원형
    . circle : 속이 빈 원형
    . square : 속이 찬 사각형 


    형식

    <OL Type = "스타일">
        <LI Type = "스타일">
        <LI Type = "스타일">
        <LI Type = "스타일">
    </OL>

    . 스타일
        . 1: 아라비아 숫자
        . A: 알파벳 대문자
        . a: 알파벳 소문자
        . I: 로마숫자 대문자
        . i: 로마숫자 소문자
 -->
