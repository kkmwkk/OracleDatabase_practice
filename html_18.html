<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIV Test</title>
</head>
<body>
    <div style = "border : 3px solid #cccc66;">
        <h2>사자</h2>
        <p>
            사자는 아프리카에 살며
            강한 다리와 턱,
            <span style="color : #0033ff;">긴 송곳니</span>를 지니고 있다.
        </p>
    </div>

    <div style = "border : 7px dotted #33ff77;">
        <h2>기린</h2>
        <p>
            기린은 아프리카에 살며
            강한 다리와 턱,
            <span style="color : #ff7777;">긴 목</span>를 지니고 있다.
        </p>
    </div>

    <div style = "border : 7px double black;">
        <h2>하마</h2>
        <p>
            하마는 아프리카에 살며
            강한 다리와 턱,
            <span style="color : #ff7777;">뚱뚱한 몸매</span>를 가지고 있다.
        </p>
    </div>
    
</body>
</html>
