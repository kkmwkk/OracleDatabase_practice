<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정의 리스트</title>
</head>
<body>
    <h3>웹 브라우저 종류</h3>
    <hr>
    <dl>
        <dt><strong>Internet Explorer</strong></dt>
        <dd>마이크로소프트에서 만든 브라우저로 현재 국내 시장에서 가장 많이 사용</dd>
        <dt><strong>Firefox</strong></dt>
        <dd>Mozilla 재단에서 오픈 소스로 만든 것으로 W3C 웹 표준을 선도</dd>
        <dt><strong>Chrome</strong></dt>
        <dd>구글에서 만든 것으로 좋은 디버거를 갖추고 있어 디버깅에 많이 사용</dd>
        <dt><strong>Opera</strong></dt>
        <dd>기본 브라우저보다 빠르고 안전하며 스마트합니다. 개인 정보 보호, 보안 등을 위한 모든 기능을 갖추고 있습니다.</dd>
    </dl>
</body>
</html>
